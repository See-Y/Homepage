<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="공부 노트, 프로젝트, 여행 기록을 모아둔 개인 포트폴리오 블로그">
  <title>Blog — 홈</title>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">

  <!-- FOUC 방지 -->
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || t === 'light') {
        document.documentElement.setAttribute('data-theme', t);
      }
    })();
  </script>

  <!-- 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">

  <!-- 스타일 -->
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/home.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <!-- 히어로 섹션 -->
    <section class="hero" id="hero">
      <div class="hero__inner container">
        <div class="hero__content">
          <h1 class="hero__title" data-i18n="home.hero.title">환영합니다</h1>
          <p class="hero__subtitle" data-i18n="home.hero.subtitle">공부 노트, 프로젝트, 여행 기록</p>
          <p class="hero__description" data-i18n="home.hero.description">보안과 CS를 공부하고, 프로젝트를 만들고, 여행을 기록합니다.</p>
        </div>
        <div class="hero__decoration" aria-hidden="true">
          <div class="hero__orb hero__orb--1"></div>
          <div class="hero__orb hero__orb--2"></div>
          <div class="hero__orb hero__orb--3"></div>
        </div>
      </div>
    </section>

    <!-- 섹션 카드 그리드 -->
    <section class="sections" id="sections">
      <div class="container">
        <div class="sections__grid">
          <!-- Studies 카드 -->
          <a href="/studies" class="section-card" id="card-studies">
            <div class="section-card__icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
              </svg>
            </div>
            <h2 class="section-card__title" data-i18n="home.sections.studies">공부 노트</h2>
            <p class="section-card__desc" data-i18n="home.sections.studies.desc">보안, 네트워크, 암호학 등 공부한 내용을 정리합니다.</p>
            <span class="section-card__arrow">→</span>
          </a>

          <!-- Projects 카드 -->
          <a href="/projects" class="section-card" id="card-projects">
            <div class="section-card__icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
              </svg>
            </div>
            <h2 class="section-card__title" data-i18n="home.sections.projects">프로젝트</h2>
            <p class="section-card__desc" data-i18n="home.sections.projects.desc">직접 만든 프로젝트들을 소개합니다.</p>
            <span class="section-card__arrow">→</span>
          </a>

          <!-- Travel 카드 -->
          <a href="/travel" class="section-card" id="card-travel">
            <div class="section-card__icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="10" r="3"></circle>
                <path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"></path>
              </svg>
            </div>
            <h2 class="section-card__title" data-i18n="home.sections.travel">여행</h2>
            <p class="section-card__desc" data-i18n="home.sections.travel.desc">여행 기록과 사진을 공유합니다.</p>
            <span class="section-card__arrow">→</span>
          </a>

          <!-- About 카드 -->
          <a href="/about" class="section-card" id="card-about">
            <div class="section-card__icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
            <h2 class="section-card__title" data-i18n="home.sections.about">소개</h2>
            <p class="section-card__desc" data-i18n="home.sections.about.desc">저에 대해 알아보세요.</p>
            <span class="section-card__arrow">→</span>
          </a>
        </div>
      </div>
    </section>

    <!-- 최근 업데이트 -->
    <section class="recent" id="recent-updates">
      <div class="container">
        <h2 class="section-heading" data-i18n="home.recent.title">최근 업데이트</h2>
        <div class="recent__list" id="recent-list">
          <div class="empty-state">
            <p class="empty-state__text" data-i18n="home.recent.empty">아직 업데이트가 없습니다.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <!-- 스크립트 -->
  <script src="/assets/js/component-loader.js"></script>
  <script src="/assets/js/theme.js"></script>
  <script src="/assets/js/mobile-menu.js"></script>
  <script src="/assets/js/i18n.js"></script>
  <script src="/assets/js/main.js"></script>
</body>
</html>
